<svg width="800" height="420" viewBox="0 0 800 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A daily reflection template with a progress score and prompts">
  <rect x="1" y="1" width="798" height="418" rx="20" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>

  <text x="48" y="60" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700" fill="#334155">Today's Reflection</text>

  <!-- Progress dial -->
  <g transform="translate(640, 120)">
    <circle cx="0" cy="0" r="56" fill="none" stroke="#E2E8F0" stroke-width="12"/>
    <path d="M0 -56 A56 56 0 1 1 -53 18" fill="none" stroke="#22C55E" stroke-width="12" stroke-linecap="round"/>
    <text x="0" y="6" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="700" fill="#22C55E">60%</text>
    <text x="0" y="30" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#94A3B8">still passing</text>
  </g>

  <!-- Prompts -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <text x="48" y="108" font-size="14" font-weight="600" fill="#64748B">What went well today?</text>
    <rect x="48" y="122" width="480" height="10" rx="5" fill="#E2E8F0"/>
    <rect x="48" y="140" width="360" height="10" rx="5" fill="#F1F5F9"/>

    <text x="48" y="190" font-size="14" font-weight="600" fill="#64748B">What slowed me down?</text>
    <rect x="48" y="204" width="440" height="10" rx="5" fill="#E2E8F0"/>
    <rect x="48" y="222" width="300" height="10" rx="5" fill="#F1F5F9"/>

    <text x="48" y="272" font-size="14" font-weight="600" fill="#64748B">One small win to repeat tomorrow</text>
    <rect x="48" y="286" width="500" height="10" rx="5" fill="#DCFCE7"/>
    <rect x="48" y="304" width="380" height="10" rx="5" fill="#F0FDF4"/>
  </g>

  <line x1="48" y1="348" x2="752" y2="348" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="48" y="384" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#94A3B8">Even a 40% day counts. Life goes on. The habit matters more than the score.</text>
</svg>
