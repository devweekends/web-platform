  <text x="48" y="58" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="800" letter-spacing="-0.5" fill="#FFFFFF">Where our fellows study</text>
  <text x="48" y="92" font-family="'Helvetica Neue', Arial, sans-serif" font-size="19" fill="#B8B8B8">Top 10 universities by selected fellows (campuses merged)</text>

