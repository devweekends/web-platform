<svg width="1000" height="800" viewBox="0 0 1000 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Top universities by selected fellows">
  <defs>
    <radialGradient id="glowU" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05"/>
