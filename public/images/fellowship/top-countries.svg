<svg width="1000" height="430" viewBox="0 0 1000 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Top countries outside Pakistan by selected fellows">
  <rect x="1" y="1" width="998" height="428" rx="18" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="48" y="56" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#334155">Reaching 30 countries</text>
  <text x="48" y="80" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94A3B8">Top countries outside Pakistan, by selected fellows</text>

  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">
    <!-- max India 117 -> 640px from x=200. width = val/117*640 -->
    <text x="48" y="128">🇮🇳 India</text>
    <rect x="200" y="115" width="640" height="20" rx="5" fill="#22C55E"/>
    <text x="852" y="131" fill="#16A34A" font-weight="700">117</text>

    <text x="48" y="172">🇳🇵 Nepal</text>
    <rect x="200" y="159" width="60" height="20" rx="5" fill="#34D27F"/>
    <text x="852" y="175" fill="#16A34A" font-weight="700">11</text>

    <text x="48" y="216">🇺🇸 USA</text>
    <rect x="200" y="203" width="44" height="20" rx="5" fill="#5BD896"/>
    <text x="852" y="219" fill="#16A34A" font-weight="700">8</text>

    <text x="48" y="260">🇬🇧 UK</text>
    <rect x="200" y="247" width="33" height="20" rx="5" fill="#86EFAC"/>
    <text x="852" y="263" fill="#16A34A" font-weight="700">6</text>

    <text x="48" y="304">🇳🇬 Nigeria</text>
    <rect x="200" y="291" width="27" height="20" rx="5" fill="#86EFAC"/>
    <text x="852" y="307" fill="#16A34A" font-weight="700">5</text>

    <text x="48" y="348">🇪🇬 Egypt</text>
    <rect x="200" y="335" width="22" height="20" rx="5" fill="#A7F3C8"/>
    <text x="852" y="351" fill="#16A34A" font-weight="700">4</text>
  </g>

  <text x="48" y="404" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94A3B8">Plus 23 more, from Politecnico di Milano to NYU Abu Dhabi and King's College London.</text>
</svg>
