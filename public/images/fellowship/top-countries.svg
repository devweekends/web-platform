<svg width="1000" height="520" viewBox="0 0 1000 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Top countries outside Pakistan by selected fellows">
  <rect x="1" y="1" width="998" height="518" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="48" y="66" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="800" fill="#1E293B">Reaching 30 countries</text>
  <text x="48" y="100" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" fill="#64748B">Top countries outside Pakistan, by selected fellows</text>

  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" fill="#334155">
    <!-- label x=48 col to 250, bar x=260 max 620 (val/117*620), value end x=950 -->
    <text x="48" y="166">🇮🇳 India</text>
    <rect x="260" y="142" width="620" height="30" rx="6" fill="#22C55E"/>
    <text x="950" y="166" text-anchor="end" fill="#16A34A" font-weight="800">117</text>

    <text x="48" y="226">🇳🇵 Nepal</text>
    <rect x="260" y="202" width="58" height="30" rx="6" fill="#34D27F"/>
    <text x="950" y="226" text-anchor="end" fill="#16A34A" font-weight="800">11</text>

    <text x="48" y="286">🇺🇸 USA</text>
    <rect x="260" y="262" width="42" height="30" rx="6" fill="#5BD896"/>
    <text x="950" y="286" text-anchor="end" fill="#16A34A" font-weight="800">8</text>

    <text x="48" y="346">🇬🇧 UK</text>
    <rect x="260" y="322" width="32" height="30" rx="6" fill="#86EFAC"/>
    <text x="950" y="346" text-anchor="end" fill="#16A34A" font-weight="800">6</text>

    <text x="48" y="406">🇳🇬 Nigeria</text>
    <rect x="260" y="382" width="27" height="30" rx="6" fill="#86EFAC"/>
    <text x="950" y="406" text-anchor="end" fill="#16A34A" font-weight="800">5</text>

    <text x="48" y="466">🇪🇬 Egypt</text>
    <rect x="260" y="442" width="21" height="30" rx="6" fill="#A7F3C8"/>
    <text x="950" y="466" text-anchor="end" fill="#16A34A" font-weight="800">4</text>
  </g>
</svg>
